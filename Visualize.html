<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Agent Priority Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .device-card { border: 1px solid #e1e4e8; padding: 15px; margin-bottom: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; }
        .device-card.winner { border-color: #28a745; background-color: #eafaf1; box-shadow: 0 0 10px rgba(40, 167, 69, 0.2); }
        .info { flex-grow: 1; }
        .controls { display: flex; gap: 20px; flex-grow: 2; }
        .control-group { display: flex; flex-direction: column; }
        .score-display { font-size: 24px; font-weight: bold; width: 100px; text-align: right; color: #007bff; }
        .winner-badge { display: none; color: #28a745; font-size: 14px; font-weight: bold; margin-top: 5px; }
        .device-card.winner .winner-badge { display: block; }
        input[type="range"] { width: 150px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dynamic Priority Score Auction</h2>
    <p style="text-align: center;">Formula: <strong>Score = (0.6 * Criticality) + (0.4 * (Jitter / 100))</strong></p>
    
    <div id="devices-container">
        <!-- Devices will be injected here by JavaScript -->
    </div>
</div>

<script>
    // Initial Device Data
    let devices = [
        { id: "med-drone-alpha", type: "Healthcare UAV", criticality: 0.95, jitter: 10 },
        { id: "factory-robot-B", type: "Industrial IoT", criticality: 0.80, jitter: 10 },
        { id: "exec-laptop-99", type: "Enterprise Media", criticality: 0.50, jitter: 10 }
    ];

    function calculateScore(device) {
        let urgency = Math.min(device.jitter / 100.0, 1.0);
        return ((0.6 * device.criticality) + (0.4 * urgency)).toFixed(3);
    }

    function render() {
        const container = document.getElementById("devices-container");
        container.innerHTML = "";

        // Calculate scores and sort devices highest to lowest
        let sortedDevices = [...devices].map(d => ({...d, score: calculateScore(d)}))
                                        .sort((a, b) => b.score - a.score);

        sortedDevices.forEach((device, index) => {
            // Only the top device gets the "winner" styling
            const isWinner = index === 0; 
            
            // Find the original index in our main array to update the right data
            const originalIndex = devices.findIndex(d => d.id === device.id);

            const card = document.createElement("div");
            card.className = `device-card ${isWinner ? 'winner' : ''}`;
            
            card.innerHTML = `
                <div class="info">
                    <strong>${device.id}</strong><br>
                    <small>${device.type}</small>
                    <div class="winner-badge">🏆 Auction Winner</div>
                </div>
                <div class="controls">
                    <div class="control-group">
                        <label>Criticality: <span>${device.criticality.toFixed(2)}</span></label>
                        <input type="range" min="0" max="1" step="0.05" value="${device.criticality}" 
                               oninput="updateValue(${originalIndex}, 'criticality', this.value)">
                    </div>
                    <div class="control-group">
                        <label>Jitter: <span>${device.jitter} ms</span></label>
                        <input type="range" min="0" max="100" step="1" value="${device.jitter}" 
                               oninput="updateValue(${originalIndex}, 'jitter', this.value)">
                    </div>
                </div>
                <div class="score-display">
                    ${device.score}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateValue(index, field, value) {
        devices[index][field] = parseFloat(value);
        render(); // Re-render everything to update sorting and scores
    }

    // Initial render
    render();
</script>

</body>
</html>
